# nginx 反代配置示例
#
# 把这段加到你现有的 nginx server block 里（listen 80 那个），
# 替换 <your-domain> 为你的域名（或者用 _ 监听所有）。
#
# 路径前缀默认是 /power/。如果你想用别的（比如 /power-monitor/），
# 同时修改 SCRIPT_PREFIX 环境变量并改这里的 location。

server {
    listen 80;
    server_name <your-domain>;

    # 默认静态文件根目录（如果你 blog 也用这台 nginx，留着）
    root /usr/share/nginx/html;
    index index.html index.htm;

    # === Power Monitor 反代 ===
    location /power/ {
        proxy_pass http://127.0.0.1:7654/power/;   # 如果你的 Flask 不在同一台机器，改为 host.docker.internal:7654 或实际 IP
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 实时数据，禁止任何缓存层缓存
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }
}

# === Cloudflare / CDN 配置 ===
#
# 如果你在 Cloudflare 后面（Cloudflare Tunnel 或 CNAME），
# 一定要加一条 Cache Rule：
#
#   URL pattern:  <your-domain>/power/api/*
#   Setting:      Cache Level = Bypass
#
# 否则 CF 会缓存 /api/summary 的 JSON 30 秒左右，仪表盘不实时。

# === Docker 化部署（可选）===
#
# 如果你想把 Flask 也丢进 docker，跟 nginx 一起 compose up：
#
# services:
#   power-collector:
#     build: .
#     command: python3 scripts/collector.py
#     volumes:
#       - ./data:/app/data
#     cap_add:
#       - NET_ADMIN   # 让容器内能跑 sudo powermetrics（需 --privileged 或 mac 不支持）
#
# 实际不建议 docker 化 collector——powermetrics 是 macOS 系统工具，
# 只能在宿主机跑。Web 服务可以 docker 化：
#
#   power-web:
#     build: .
#     command: python3 scripts/web.py
#     ports:
#       - "7654:7654"
#     volumes:
#       - ./data:/app/data   # 共享 collector 的 SQLite